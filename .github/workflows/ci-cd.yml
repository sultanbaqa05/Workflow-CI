name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  DOCKER_IMAGE: ${{ secrets.DOCKER_USERNAME }}/prediksi-kelulusan-mahasiswa
  DAGSHUB_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
  DAGSHUB_REPO: ${{ secrets.DAGSHUB_REPO }}
  DAGSHUB_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}

jobs:
  # Job 1: Test & Lint
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12.7
        uses: actions/setup-python@v5
        with:
          python-version: "3.12.7"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check Env
        run: |
          python --version
          pip --version
          mlflow --version

      - name: Run preprocessing
        run: python src/automate_preprocessing.py

      - name: Run mlflow project
        env:
          DAGSHUB_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
          DAGSHUB_REPO: ${{ secrets.DAGSHUB_REPO }}
          DAGSHUB_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
        run: mlflow run MLProject --env-manager=local --experiment-name Prediksi_Kelulusan_Mahasiswa_Autolog

      - name: Run modelling tuning (manual log)
        env:
          DAGSHUB_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
          DAGSHUB_REPO: ${{ secrets.DAGSHUB_REPO }}
          DAGSHUB_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
        run: python src/modelling_tuning.py

      - name: Get best tuned MLflow model URI
        run: |
          python -c "
          import json
          from pathlib import Path

          metric_path = Path('artifacts/metric_info_tuned.json')
          if not metric_path.exists():
              metric_path = Path('artifacts/metric_info.json')

          info = json.loads(metric_path.read_text())
          best_model = info.get('best_model') or info.get('model_name')
          run_id = info['results'][best_model]['run_id'] if 'results' in info else info['run_id']

          with open('$GITHUB_ENV', 'a') as env:
              env.write(f'MODEL_URI=runs:/{run_id}/model\n')

          print(f'Best model: {best_model}')
          print(f'Model URI: runs:/{run_id}/model')
          "

      - name: Upload MLflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mlflow-artifacts
          path: |
            mlruns/
            artifacts/
          retention-days: 30

      - name: Upload processed data
        uses: actions/upload-artifact@v4
        with:
          name: processed-data
          path: data/processed/
          retention-days: 30

  # Job 2: Build & Push Docker
  docker:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download MLflow artifacts
        uses: actions/download-artifact@v4
        with:
          name: mlflow-artifacts
          path: .

      - name: Download processed data
        uses: actions/download-artifact@v4
        with:
          name: processed-data
          path: data/processed/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image with MLflow
        env:
          MLFLOW_TRACKING_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
          MLFLOW_TRACKING_URI: https://dagshub.com/${{ secrets.DAGSHUB_USERNAME }}/${{ secrets.DAGSHUB_REPO }}.mlflow
        run: |
          mlflow models build-docker --model-uri "$MODEL_URI" --name "${{ env.DOCKER_IMAGE }}:latest" --env-manager=local
          docker tag "${{ env.DOCKER_IMAGE }}:latest" "${{ env.DOCKER_IMAGE }}:${{ github.sha }}"

      - name: Push Docker image
        run: |
          docker push "${{ env.DOCKER_IMAGE }}:latest"
          docker push "${{ env.DOCKER_IMAGE }}:${{ github.sha }}"

      - name: Verify Docker image
        run: |
          echo "Docker image pushed: ${{ env.DOCKER_IMAGE }}:latest"
          echo "Docker image pushed: ${{ env.DOCKER_IMAGE }}:${{ github.sha }}"
