global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # FastAPI model serving metrics
  - job_name: "model-serving"
    static_configs:
      - targets: ["model-serving:8000"]
    metrics_path: "/metrics"
    scrape_interval: 10s

  # Custom Prometheus exporter metrics
  - job_name: "model-exporter"
    static_configs:
      - targets: ["prometheus-exporter:8001"]
    scrape_interval: 15s

  # Prometheus self-monitoring
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
